name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21 och Maven-auth
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: github
        server-username: MY_GITHUB_USERNAME
        server-password: MY_GITHUB_TOKEN

    - name: Build with Maven
      run: mvn -B clean package
      env:
        MY_GITHUB_USERNAME: ${{ secrets.MY_GITHUB_USERNAME }}
        MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      # if: github.event_name != 'pull_request'  # Kommenterat ut för att tillåta push vid PR-test
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        # push: ${{ github.event_name != 'pull_request' }} # Kommenterat ut för att tillåta push vid PR-test
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/webshop-gr3:latest
          ${{ secrets.DOCKER_USERNAME }}/webshop-gr3:1.0.0
