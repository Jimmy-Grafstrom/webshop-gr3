<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>
<body>
<div th:replace="~{fragments/header::header}"></div>

<div>

<div th:if="${errorMessage}" class="alert alert-warning" th:text="${errorMessage}">


</div>
<h2 style="text-align:center">Checkout</h2>

<div th:if="${cart == null or cart.allProductsInCart.isEmpty()}">
    <p style="text-align:center">Your shopping cart is empty. Please go to <a href="/products"> add products</a></p>
</div>

<div th:unless="${cart == null or cart.allProductsInCart.isEmpty()}">
    <table>
        <thead>
        <tr>
            <th>Product</th>
            <th>price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
        </tr>
        </thead>
        <tbody>
            <tr th:each="item:${cart.allProductsInCart}">
                <td th:text="${item.product.name}">Product</td>
                <td> <span th:text="${item.product.price}">0.00</span> kr</td>
                <td th:text="${item.quantity}">0</td>
                <td><span th:text="${item.product.price*item.quantity}">0.00</span> kr</td>
            </tr>
        </tbody>
    </table>
    <div class="total">
        <strong>Total</strong>
        <span th:text="${totalPrice}">0.00</span> kr
    </div>
</div>

<div>
    <a href="/products" class="btn">Continue shopping</a>
    <form th:action="@{/checkout}" method="post" style="display:inline;">
        <button type="submit" class="btn">Confirm the order</button>
    </form>
</div>

<br>
<br>
<br>
<div th:replace="fragments/footer::footer"></div>
</div>
</body>
</html>
