<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1>Add New Product</h1>

    <form th:action="@{/admin/add}" th:object="${product}" method="post">
        <div>
            <label for="name">Product Name:</label>
            <input type="text" id="name" th:field="*{name}" required/>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</p>
        </div>
        <div>
            <label for="price">Price:</label>
            <input type="number" step="0.01" id="price" th:field="*{price}" required/>
            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Error</p>
        </div>
        <div>
            <label for="category">Category:</label>
            <input type="text" id="category" th:field="*{category}" required/>
            <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Error</p>
        </div>
        <div>
            <label for="imageUrl">Image URL:</label>
            <input type="text" id="imageUrl" th:field="*{imageUrl}" required/>
            <p th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}">Error</p>
        </div>
        <button type="submit">Save Product</button>
        <a th:href="@{/admin}">Cancel</a>
    </form>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
