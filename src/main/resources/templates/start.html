<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Main</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/header::header"></div>

<div th:if="${cookieFeedback}" class="cookie-success">
    <p th:text="${cookieFeedback}"></p>
</div>

<div th:if="${!hasConsent}" id="cookie-banner">
    <p>Vi använder cookies för att förbättra din upplevelse på vår webbplats.</p>
    <form th:action="@{/consent}" method="post">
        <button type="submit" class="btn">Acceptera cookies</button>
    </form>
</div>

<div class="container">

    <h1>Welcome to the Webshop</h1>

    <div sec:authorize="isAnonymous()">
        <p>Please log in or sign up to start shopping.</p>
        <div style="margin-top: 20px;">
            <a th:href="@{/login}" class="btn">Login</a>
            <a th:href="@{/register}" class="btn">Sign up</a>
        </div>
    </div>

    <div sec:authorize="isAuthenticated()">
        <p>Welcome back, <span sec:authentication="name">User</span>!</p>
        <div style="margin-top: 20px;">
            <a th:href="@{/products}" class="btn">Start Shopping</a>
            <a th:href="@{/user/profile}" class="btn">My Profile</a>
        </div>
    </div>

</div>

<div th:replace="fragments/footer::footer"></div>

</body>
</html>
