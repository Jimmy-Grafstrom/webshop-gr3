<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <!-- ✅ same CSS as everything else -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- header -->
<div th:replace="fragments/header::header"></div>

<div class="container">

    <h1>Edit Product</h1>

    <form th:action="@{/admin/edit/{id}(id=${product.id})}"
          th:object="${product}"
          method="post">

        <input type="hidden" th:field="*{id}"/>

        <div>
            <label>Product Name:</label>
            <input type="text" th:field="*{name}" required/>
            <p th:errors="*{name}"></p>
        </div>

        <div>
            <label>Price:</label>
            <input type="number" step="0.01" th:field="*{price}" required/>
            <p th:errors="*{price}"></p>
        </div>

        <div>
            <label>Category:</label>
            <input type="text" th:field="*{category}" required/>
            <p th:errors="*{category}"></p>
        </div>

        <div>
            <label>Image URL:</label>
            <input type="text" th:field="*{imageUrl}" required/>
            <p th:errors="*{imageUrl}"></p>
        </div>

        <button type="submit" class="btn">Update Product</button>

        <a th:href="@{/admin}" class="btn">Cancel</a>

    </form>

</div>

<!-- footer -->
<div th:replace="fragments/footer::footer"></div>

</body>
</html>
