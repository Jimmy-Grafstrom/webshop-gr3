<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Products</title>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1>Admin Dashboard - Product Management</h1>

    <div>
        <a th:href="@{/admin/add}">
            <button type="button">Add New Product</button>
        </a>
    </div>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${allProducts}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category}"></td>
            <td>
                <img th:src="${product.imageUrl}" alt="Product image" width="50"/>
            </td>
            <td>
                <a th:href="@{/admin/edit/{id}(id=${product.id})}">
                    <button type="button">Edit</button>
                </a>
                <form th:action="@{/admin/delete/{id}(id=${product.id})}" th:method="delete" style="display:inline;">
                    <button type="submit" onclick="return confirm('Are you sure you want to delete this product?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <hr>

    <h2>Order Management</h2>
    <table border="1">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Total Price</th>
            <th>Order Date</th>
            <th>Items</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${allOrders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.username}"></td>
            <td th:text="${order.totalPrice}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <ul>
                    <li th:each="item : ${order.orderItems}">
                        <span th:text="${item.productName}"></span> x
                        <span th:text="${item.quantity}"></span>
                        (<span th:text="${item.price}"></span> SEK)
                    </li>
                </ul>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
