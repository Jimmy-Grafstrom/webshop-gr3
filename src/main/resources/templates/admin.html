<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Products</title>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1>Admin Dashboard - Product Management</h1>

    <div>
        <a th:href="@{/admin/add}">
            <button type="button">Add New Product</button>
        </a>
    </div>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Image</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${allProducts}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.category}"></td>
                <td>
                    <img th:src="${product.imageUrl}" alt="Product image" width="50"/>
                </td>
                <td>
                    <a th:href="@{/admin/edit/{id}(id=${product.id})}">
                        <button type="button">Edit</button>
                    </a>
                    <form th:action="@{/admin/delete/{id}(id=${product.id})}" th:method="delete" style="display:inline;">
                        <button type="submit" onclick="return confirm('Are you sure you want to delete this product?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
