<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container">
    <h1>Products 🛍️</h1>

    <!-- Loop through products -->
    <th:block th:if="${products} != null" th:each="product : ${products}">
        <table border="0" style="width: 100%; margin-bottom: 20px;">
            <tr>
                <td><img th:src="${product.imageUrl}" alt="Product image" width="100"/></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.category}"></td>
                <td th:text="${product.price} + ' kr'"></td>
                <td>
                    <!-- ✅ Add to cart button -->
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <button type="submit" class="btn">Add to cart</button>
                    </form>
                </td>
            </tr>
        </table>
    </th:block>
    <br>

    <a th:href="@{/cart}" class="btn" style="background-color: #2c3e50;">Go to Cart 🛒</a>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
